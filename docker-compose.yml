services:
  portfolio_proxy:
    image: nginx:1.30.1-alpine
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      portfolio_backend:
        condition: service_healthy
      portfolio_frontend:
        condition: service_healthy
    networks:
      - dokploy-network
      - portfolio_internal

  portfolio_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    volumes:
      - ./data:/app/data
    command: /app/entrypoint.sh
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      portfolio_internal:
        aliases:
          - portfolio_backend
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
        reservations:
          memory: 1G

  portfolio_frontend:
    build:
      context: ./portfolio
      dockerfile: Dockerfile
    depends_on:
      portfolio_backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=/api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      portfolio_internal:
        aliases:
          - portfolio_frontend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M

networks:
  dokploy-network:
    external: true

  portfolio_internal:
    driver: bridge