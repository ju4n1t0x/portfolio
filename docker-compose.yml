services:
  proxy:
    image: nginx:alpine
    container_name: proxy
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    volumes:
      - ./data:/app/data
    command: /app/entrypoint.sh
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ./portfolio
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
