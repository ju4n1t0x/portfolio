name: CI

on:
  pull_request:
    branches:
      - dev
      - test
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
